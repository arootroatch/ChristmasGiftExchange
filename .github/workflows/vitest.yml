name: Test and Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  e2e:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Run e2e tests
        run: npm run e2e

  deploy-staging:
    needs: [test, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: node dev/run-migrations.mjs
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          MONGODB_DATABASE: gift-exchange-staging

      - name: Sync indexes
        run: node dev/sync-indexes.mjs
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          MONGODB_DATABASE: gift-exchange-staging

      - name: Build
        run: npm run build

      - name: Deploy staging to Netlify
        run: npx netlify-cli deploy --dir=dist --site $NETLIFY_SITE_ID --auth $NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: node dev/run-migrations.mjs
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          MONGODB_DATABASE: gift-exchange

      - name: Sync indexes
        run: node dev/sync-indexes.mjs
        env:
          MONGO_DB_URI: ${{ secrets.MONGO_DB_URI }}
          MONGODB_DATABASE: gift-exchange

      - name: Build
        run: npm run build

      - name: Deploy production to Netlify
        run: npx netlify-cli deploy --prod --dir=dist --site $NETLIFY_SITE_ID --auth $NETLIFY_AUTH_TOKEN
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
