<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title></title>
</head>
<body
        style="
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      background-color: #fff;
    "
>
<table
        role="presentation"
        style="
        width: 100%;
        border-collapse: collapse;
        border: 0;
        border-spacing: 0;
        padding: 20px;
      "
>
    <tr>
        <td align="center" style="padding: 30px; font-size: 36px; color: #2e7d32;">
            Wishlist Alert!
        </td>
    </tr>
    <tr>
        <td align="center" style="padding: 20px 50px; font-size: 18px; color: #333;">
            {{recipientName}} has added a wishlist for you to check out!
        </td>
    </tr>
    <tr>
        <td align="center" style="padding: 20px 50px;">
            <a href="{{wishlistViewUrl}}"
               style="display: inline-block; padding: 12px 24px; background-color: #2e7d32;
                      color: white; text-decoration: none; border-radius: 4px; font-size: 16px;">
                View Their Wishlist
            </a>
        </td>
    </tr>
    <tr>
        <td align="left" style="padding: 50px; font-size: 20px">
            Happy gift giving!
        </td>
    </tr>
    <tr>
        <td align="left" style="padding-left: 50px; padding-top: 0; font-size: 20px">
            Alex at the Gift Exchange Generator
        </td>
    </tr>
</table>
</body>
</html>
