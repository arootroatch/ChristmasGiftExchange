<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Server Error Alert</title>
</head>
<body style="margin: 0; padding: 0; font-family: monospace; color: #000; background-color: #fff;">
<table role="presentation" style="width: 100%; border-collapse: collapse; border: 0; border-spacing: 0; padding: 20px;">
    <tr>
        <td style="padding: 20px; font-size: 24px; color: #b31e20; font-family: Arial, Helvetica, sans-serif;">
            Server Error in Gift Exchange Generator
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 20px; font-size: 14px; font-family: Arial, Helvetica, sans-serif;">
            <strong>Endpoint:</strong> {{endpoint}}
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 20px; font-size: 14px; font-family: Arial, Helvetica, sans-serif;">
            <strong>Time:</strong> {{timestamp}}
        </td>
    </tr>
    <tr>
        <td style="padding: 20px;">
            <pre style="background-color: #f4f4f4; padding: 16px; border-radius: 4px; overflow-x: auto; font-size: 13px;">{{stackTrace}}</pre>
        </td>
    </tr>
</table>
</body>
</html>
