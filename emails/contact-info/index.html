<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title></title>
</head>
<body
        style="
      margin: 0;
      padding: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: #000;
      background-color: #fff;
    "
>
<table
        role="presentation"
        style="
        width: 100%;
        border-collapse: collapse;
        border: 0;
        border-spacing: 0;
        padding: 20px;
      "
>
    <tr>
        <td align="center" style="padding: 30px; font-size: 36px; color: #2e7d32;">
            Contact Info Received!
        </td>
    </tr>
    <tr>
        <td align="center" style="padding: 20px 50px; font-size: 18px; color: #333;">
            {{recipientName}} has shared their contact information with you:
        </td>
    </tr>
    <tr>
        <td style="padding: 10px 50px;">
            <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
                <tr>
                    <td style="padding: 8px; font-weight: bold; color: #555;">Shipping Address:</td>
                    <td style="padding: 8px; color: #333;">{{address}}</td>
                </tr>
                <tr>
                    <td style="padding: 8px; font-weight: bold; color: #555;">Phone:</td>
                    <td style="padding: 8px; color: #333;">{{phone}}</td>
                </tr>
                <tr>
                    <td style="padding: 8px; font-weight: bold; color: #555;">Notes:</td>
                    <td style="padding: 8px; color: #333;">{{notes}}</td>
                </tr>
            </table>
        </td>
    </tr>
    <tr>
        <td align="left" style="padding: 50px; font-size: 20px">
            Happy gift giving!
        </td>
    </tr>
    <tr>
        <td align="left" style="padding-left: 50px; padding-top: 0; font-size: 20px">
            Alex at the Gift Exchange Generator
        </td>
    </tr>
</table>
</body>
</html>
