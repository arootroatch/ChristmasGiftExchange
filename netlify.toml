[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[dev]
  command = "npx vite"
  targetPort = 5173
  framework = "#custom"

[[redirects]]
  from = "/wishlist/edit"
  to = "/pages/wishlist/edit/index.html"
  status = 200

[[redirects]]
  from = "/wishlist/edit/*"
  to = "/pages/wishlist/edit/index.html"
  status = 200

[[redirects]]
  from = "/wishlist/view"
  to = "/pages/wishlist/view/index.html"
  status = 200

[[redirects]]
  from = "/wishlist/view/*"
  to = "/pages/wishlist/view/index.html"
  status = 200

[[redirects]]
  from = "/reuse"
  to = "/pages/reuse/index.html"
  status = 200

[[redirects]]
  from = "/reuse/*"
  to = "/pages/reuse/index.html"
  status = 200

[[redirects]]
  from = "/dev/emails"
  to = "/pages/dev/emails/index.html"
  status = 200

[[redirects]]
  from = "/dev/emails/*"
  to = "/pages/dev/emails/index.html"
  status = 200
