[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/dashboard/*"
  to = "/dashboard/index.html"
  status = 200

[dev]
  command = "npx vite"
  targetPort = 5173
  framework = "#custom"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdnjs.buymeacoffee.com https://kit.fontawesome.com https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com https://ka-f.fontawesome.com; connect-src 'self' https://ka-f.fontawesome.com https://cdnjs.buymeacoffee.com; img-src 'self' data: https://cdn.buymeacoffee.com https://img.buymeacoffee.com; frame-src 'self' https://www.buymeacoffee.com https://buymeacoffee.com https://cdn.buymeacoffee.com; object-src 'none'; base-uri 'self'"
